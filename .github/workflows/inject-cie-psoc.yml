name: Integrate CIE into PSOC
on:
  push:
    branches: [main]
    paths:
      - 'cie-psoc-integration.js'
      - '.github/workflows/inject-cie-psoc.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject CIE module
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('phishing-admin.html')
          text=p.read_text(encoding='utf-8')
          tag='<script type="module" src="./cie-psoc-integration.js"></script>'
          if tag not in text:
              text=text.replace('</body>',tag+'</body>')
              p.write_text(text,encoding='utf-8')
          PY
      - name: Commit integration
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add phishing-admin.html
          git commit -m 'Integrate Campaign Intelligence Engine into PSOC'
          git push
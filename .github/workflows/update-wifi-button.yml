name: Update WiFi completion button

on:
  push:
    paths:
      - '.github/workflows/update-wifi-button.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace button label
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('wifi.html')
          text = p.read_text(encoding='utf-8')
          old = 'ENTENDIDO, JUGARÉ SEGURO'
          new = 'ENTENDIDO, TENDRÉ PRECAUCIÓN'
          if old not in text:
              raise SystemExit(f'Expected label not found: {old}')
          p.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Remove one-time workflow
        run: rm .github/workflows/update-wifi-button.yml
      - name: Commit change
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add wifi.html .github/workflows/update-wifi-button.yml
          git commit -m 'Update WiFi completion button copy'
          git push

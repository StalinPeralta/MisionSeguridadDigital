name: Inject PSOC Survey Integration
on:
  push:
    paths:
      - '.github/workflows/inject-psoc-survey-integration.yml'
      - 'psoc-survey-integration.js'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject integration script
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('phishing-admin.html')
          s = p.read_text(encoding='utf-8')
          tag = '<script src="./psoc-survey-integration.js?v=1"></script>'
          if tag not in s:
              s = s.replace('</body>', tag + '</body>')
              p.write_text(s, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add phishing-admin.html
          git diff --cached --quiet || git commit -m "Enable survey phishing in PSOC campaign builder"
          git push